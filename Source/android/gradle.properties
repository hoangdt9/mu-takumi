org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
## Use Android Studio / JetBrains JBR or system JDK 17+ via JAVA_HOME (avoid hardcoded Windows paths).
android.useAndroidX=true
android.enableJetifier=false
org.gradle.parallel=true
org.gradle.caching=true

# First-hop TCP (Connect / CS) baked into APK for local dev. ./gradlew -P overrides these.
# For a store / CI release build, comment out or set host empty and port 0.
muBootstrapServerHost=192.168.1.50
muBootstrapServerPort=44605
