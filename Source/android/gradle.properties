org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
## Gradle 8.14+ supports running the build on JDK 24. The app module still targets Java 17 bytecode (see app/build.gradle compileOptions).
android.useAndroidX=true
android.enableJetifier=false
org.gradle.parallel=true
org.gradle.caching=true

# Connect port baked into APK. LAN host defaults from ../../server-next/.env (TAKUMI_LAN_IP); override: -PmuLanIp= / -PmuBootstrapServerHost=
muBootstrapServerPort=44605
