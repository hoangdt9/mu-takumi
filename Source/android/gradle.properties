org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# --- JDK / Gradle daemon (unified for all branches & machines) ---
# Use JDK 17 or 21 (LTS) for ./gradlew and the IDE Gradle sync. JDK 24 often stalls AGP on "CONFIGURING > :app".
# If sync hangs (common behind VPN + bad JAVA_HOME): point Gradle at Android Studio's JBR, e.g. uncomment ONE line and fix the path:
# org.gradle.java.home=/Applications/Android Studio.app/Contents/jbr/Contents/Home
# Or: export JAVA_HOME=$(/usr/libexec/java_home -v 21)

android.useAndroidX=true
android.enableJetifier=false

# Preload data.zip + LAN bootstrap: ../../server-next/.env (TAKUMI_LAN_IP, TAKUMI_PUBLIC_HOST, TAKUMI_DATA_ZIP_URL, …).
# CI / one-off: -PmuDataZipLan= -PmuLanIp= -PmuBootstrapServerHost= -PmuBootstrapServerPort=
org.gradle.parallel=true
org.gradle.caching=true
