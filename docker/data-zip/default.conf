server {
    listen 80;
    server_name _;

    # Large MU client bundle; disable buffering helps slow clients
    sendfile on;
    tcp_nopush on;

    location = /data.zip {
        alias /srv/data/data.zip;
        types { }
        default_type application/octet-stream;
        add_header Cache-Control "no-store";
    }

    location = / {
        default_type text/plain;
        return 200 'Takumi data zip: GET /data.zip (place file in docker/data-zip/host/data.zip on host)\n';
    }
}
