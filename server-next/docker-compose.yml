# Takumi Server Next — Postgres + LegacyLoginHost (Connect 44605 + game/login 44606) for LAN Android QA.
#
# Usage:
#   cd takumi/server-next
#   cp -n .env.lan.example .env   # set TAKUMI_LAN_IP to this machine's LAN IP (same Wi‑Fi as the phone)
#   docker compose up -d
#   ./scripts/docker-up.sh        # same + sanity checks
#
# After the first `up`, Docker Desktop restarts will bring containers back if they were running
# (`restart: unless-stopped`). Stop explicitly: `docker compose down`.
#
# Default: host 54444 → Postgres; 44605/44606 → LegacyLoginHost (see .env for overrides).
#
# Optional LAN static `data.zip` (Android Preload): same stack, **different port** (default 18080):
#   docker compose --profile datazip up -d
#   # or: COMPOSE_PROFILES=datazip in .env, or ./scripts/docker-up.sh --with-datazip
# Place file at ../docker/data-zip/host/data.zip → http://<LAN-IP>:18080/data.zip

# Optional dedicated game TCP (M6): `docker compose --profile gamehost up -d`
# Set TAKUMI_GAME_PORT (e.g. 55901) in .env to match ConnectServer F4 03; publish with TAKUMI_GAME_PUBLISH.
# LegacyLoginHost must advertise the same port (empty TAKUMI_GAME_PORT in legacy-login = login port only).

services:
  postgres:
    image: postgres:16-alpine
    container_name: takumi-next-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${TAKUMI_PG_USER:-takumi}"
      POSTGRES_PASSWORD: "${TAKUMI_PG_PASSWORD:-takumi}"
      POSTGRES_DB: "${TAKUMI_PG_DATABASE:-takumi_runtime}"
    ports:
      - "${TAKUMI_POSTGRES_PUBLISH_PORT:-54444}:5432"
    volumes:
      - takumi_next_pgdata:/var/lib/postgresql/data
      # First-time DB init only (empty volume): roster table for M4b JSON↔Postgres sync.
      - ./sql/init:/docker-entrypoint-initdb.d:ro

  # No `build:` here — image is plain dotnet/sdk; your repo is bind-mounted to /app and compiled on each start.
  # First lines in logs appear only after `dotnet build` (~1–3 min). Use: docker compose logs -f legacy-login
  # `docker compose build legacy-login` does not rebuild Program.cs (nothing to build at image level).
  legacy-login:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: takumi-legacy-login
    restart: unless-stopped
    depends_on:
      - postgres
    working_dir: /app
    volumes:
      - .:/app
      # Default: server-next/keys/Dec2.dat. Override: TAKUMI_DEC2_HOST_DIR=../ClientBuild/Data (or any host dir containing Dec2.dat)
      - ${TAKUMI_DEC2_HOST_DIR:-./keys}:/keys:ro
    ports:
      - "${TAKUMI_CONNECT_PUBLISH:-44605}:${TAKUMI_CONNECT_PORT:-44605}"
      - "${TAKUMI_LEGACY_LOGIN_PUBLISH:-44606}:${TAKUMI_LOGIN_PORT:-44606}"
    environment:
      TAKUMI_LOGIN_PORT: "${TAKUMI_LOGIN_PORT:-44606}"
      TAKUMI_CONNECT_PORT: "${TAKUMI_CONNECT_PORT:-44605}"
      TAKUMI_GAME_PORT: "${TAKUMI_GAME_PORT:-}"
      TAKUMI_SESSION_TICKET_TTL_MINUTES: "${TAKUMI_SESSION_TICKET_TTL_MINUTES:-}"
      # Always /keys/Dec2.dat (mounted volume). Do not use ${TAKUMI_DEC2_PATH} from host .env — paths
      # like /Users/... do not exist in the container and SimpleModulus falls back to wrong keys.
      TAKUMI_DEC2_PATH: /keys/Dec2.dat
      TAKUMI_LAN_IP: "${TAKUMI_LAN_IP:-}"
      TAKUMI_PUBLIC_HOST: "${TAKUMI_PUBLIC_HOST:-}"
      TAKUMI_CS_CONNECT_IDS: "${TAKUMI_CS_CONNECT_IDS:-}"
      TAKUMI_CS_CONNECT_BASE: "${TAKUMI_CS_CONNECT_BASE:-}"
      TAKUMI_CS_CONNECT_COUNT: "${TAKUMI_CS_CONNECT_COUNT:-}"
      TAKUMI_VERBOSE: "${TAKUMI_VERBOSE:-1}"
      DOTNET_ENVIRONMENT: "${DOTNET_ENVIRONMENT:-Development}"
    # Build then run so a stale bin/Release from the host volume cannot mask Program.cs changes.
    command:
      - /bin/sh
      - -c
      - >-
        echo "[legacy-login] starting (bind-mount /app). dotnet build Release next — wait 1–3 min before ports answer…"
        && dotnet build src/Takumi.Server.LegacyLoginHost/Takumi.Server.LegacyLoginHost.csproj -c Release -nologo -v q
        && echo "[legacy-login] build OK — exec LegacyLoginHost (44605 connect + TAKUMI_LOGIN_PORT game)…"
        && exec dotnet run --project src/Takumi.Server.LegacyLoginHost/Takumi.Server.LegacyLoginHost.csproj -c Release --no-build

  # M6 — optional second process: minimal GameServer bootstrap (C1 F1 00 + decrypt RX log). Profile **gamehost**.
  game-host:
    profiles: ["gamehost"]
    image: mcr.microsoft.com/dotnet/sdk:10.0
    container_name: takumi-game-host
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ${TAKUMI_DEC2_HOST_DIR:-./keys}:/keys:ro
    ports:
      - "${TAKUMI_GAME_PUBLISH:-55901}:${TAKUMI_GAME_PORT:-55901}"
    environment:
      # Redirects all GameHost graph obj/bin to /tmp (see server-next/Directory.Build.props).
      TAKUMI_DOCKER_GAMEHOST: "1"
      TAKUMI_GAME_PORT: "${TAKUMI_GAME_PORT:-55901}"
      TAKUMI_DEC2_PATH: /keys/Dec2.dat
      # Android ENCRYPT_STATE: recv on GS-range ports runs gProtect.DecryptData — outbound must be XOR'd.
      # Quoted "1" avoids YAML boolean quirks; override with TAKUMI_GAME_CLIENT_PROTECT_WIRE=0 in .env only for non-Android clients.
      TAKUMI_GAME_CLIENT_PROTECT_WIRE: "${TAKUMI_GAME_CLIENT_PROTECT_WIRE:-1}"
      TAKUMI_PROTECT_CUSTOMER_NAME: "${TAKUMI_PROTECT_CUSTOMER_NAME:-takumi12}"
      # Match server-next/env.defaults so GameHost always enters minimal-login even if RepoEnvLoader
      # cannot resolve server-next (cwd/mount edge cases). Override in .env if needed.
      TAKUMI_ACCOUNTS: "${TAKUMI_ACCOUNTS:-test:test;admin:admin}"
      TAKUMI_SERVER_SERIAL: "${TAKUMI_SERVER_SERIAL:-TbYehR2hFUPBKgZj}"
      TAKUMI_JOIN_VERSION: "${TAKUMI_JOIN_VERSION:-10405}"
      TAKUMI_VERBOSE: "${TAKUMI_VERBOSE:-1}"
      DOTNET_ENVIRONMENT: "${DOTNET_ENVIRONMENT:-Development}"
    # Bind-mount + host obj → NETSDK1064; script uses TAKUMI_DOCKER_GAMEHOST + Directory.Build.props for /tmp outputs (no shared rm).
    command:
      - /bin/sh
      - /app/scripts/docker-game-host-boot.sh

  # Static HTTP for Android Preload `data.zip` (nginx). Host port **defaults to 18080** — not 44605/44606.
  datazip:
    profiles: ["datazip"]
    image: nginx:alpine
    container_name: takumi-next-datazip
    restart: unless-stopped
    ports:
      - "${DATA_ZIP_PUBLISH_PORT:-18080}:80"
    volumes:
      - ${TAKUMI_DATA_ZIP_HOST_DIR:-../docker/data-zip/host}:/srv/data:ro
      - ${TAKUMI_DATA_ZIP_NGINX_CONF:-../docker/data-zip/default.conf}:/etc/nginx/conf.d/default.conf:ro

volumes:
  takumi_next_pgdata:
